# 仅启动 PostgreSQL，供本地 go run / npm run dev 使用
# 用法: docker compose -f docker-compose.dev.yml up -d

name: surveybox-dev

services:
  postgres:
    image: postgres:15-alpine
    container_name: surveybox-postgres-dev
    environment:
      POSTGRES_USER: surveybox
      POSTGRES_PASSWORD: surveybox
      POSTGRES_DB: surveybox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surveybox -d surveybox"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
