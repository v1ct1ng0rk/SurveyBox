name: surveybox

services:
  postgres:
    image: postgres:15-alpine
    container_name: surveybox-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-surveybox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-surveybox}
      POSTGRES_DB: ${POSTGRES_DB:-surveybox}
    volumes:
      - ${POSTGRES_DATA_DIR:-/data/workspace/db/pg/SurveyBox}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-surveybox} -d ${POSTGRES_DB:-surveybox}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - surveybox
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: surveybox-api
    env_file:
      - .env
    environment:
      # 固定指向 compose 内 postgres；勿用 .env 的 localhost DATABASE_URL
      DATABASE_URL: postgres://${POSTGRES_USER:-surveybox}:${POSTGRES_PASSWORD:-surveybox}@postgres:5432/${POSTGRES_DB:-surveybox}?sslmode=disable
      API_ADDR: :8080
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost}
      STORAGE_LOCAL_PATH: /app/data/files
      STORAGE_BACKEND: local
    volumes:
      - file_data:/app/data/files
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    networks:
      - surveybox
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: surveybox-web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - surveybox
    restart: unless-stopped

networks:
  surveybox:
    driver: bridge

volumes:
  file_data:
